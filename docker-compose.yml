# Só a API — Postgres fica fora (o mesmo que usas no Beekeeper / npm local).
#
# 1. .env com DB_*_LOCAL, ENVIRONMENT, COGNITO_*, etc. (sem sobrescrever credenciais aqui).
# 2. Se o Postgres corre na máquina host, use DB_HOST_LOCAL=host.docker.internal (não localhost).
# 3. docker compose up --build -d
# 4. http://localhost:8080  (ou HTTP_PORT_PUBLISH no .env)
#
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HTTP_PORT_PUBLISH:-8080}:3000"
    env_file:
      - .env
    environment:
      # Porta interna do container; o mapeamento acima expõe no host.
      PORT: 3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
